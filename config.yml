baseURL: "https://z-richard.github.io" 
title: Richard Zhuang
paginate: 20
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true

taxonomies:
    tag: tags

menu:
    main:
        - name: Papers
          url: papers/
          weight: 1
        - name: Courses
          url: courses/
          weight: 2
        - name: Data
          url: data/
          weight: 3 
        - name: Newsletter
          url: https://pmichaillat.substack.com
          weight: 4

params:
    description: "I am a first-year graduate student at the University of Washington."
    author: Richard Zhuang
    # googleAnalyticsID: "G-XXXXX"
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowRssButtonInSectionTermList: false
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Richard Zhuang
          subtitle: "I am a first-year graduate student studying Tropical Meteorology at the University of Washington. Under the advisory of Professor Shuyi Chen, I am investigating the multiscale variability of the Atlantic ITCZ."
          imageUrl: "IMG_20200804_120034.jpg"
          imageWidth: 160
          imageHeight: 160
          imageTitle: Richard Zhuang
          buttons:
            - name: Papers
              url: papers/
            - name: Data
              url: data/
            - name: Tags
              url: tags/
            - name: Archive
              url: archive/
    socialIcons:
        - name: CV
          url: cv.pdf
        - name: Location
          url: location/
        - name: Google Scholar
          url: https://scholar.google.com/citations?user=pefqNyIAAAAJ
        - name: GitHub
          url: https://github.com/Z-Richard

    assets:
        disableHLJS: true
        disableScrollBarStyle: true
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "Richard Zhuang"
      icon: favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn 
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2
